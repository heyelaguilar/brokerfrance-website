<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>La Residencia — Tripping Summary for Arvie</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:#fff;color:#111;-webkit-font-smoothing:antialiased;padding:32px 40px}

/* ── HEADER ── */
.doc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:20px;border-bottom:2px solid #1C3F2F}
.brand{display:flex;align-items:center;gap:10px}
.brand img{height:36px;width:auto}
.brand-name{font-size:15px;font-weight:800;color:#1C3F2F;letter-spacing:-.01em}
.brand-sub{font-size:10px;color:#aaa;letter-spacing:.04em}
.doc-meta{text-align:right}
.doc-meta .label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#bbb;margin-bottom:1px}
.doc-meta .value{font-size:13px;font-weight:700;color:#1C3F2F}
.doc-meta .date{font-size:11px;color:#999;margin-top:1px}

/* ── TITLE BLOCK ── */
.title-block{margin-bottom:20px;display:flex;align-items:baseline;gap:14px}
.client-tag{
  display:inline-block;background:#f0f7f3;border:1px solid #c6e2d4;color:#1C3F2F;
  font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  padding:3px 10px;border-radius:100px;white-space:nowrap;
}
.title-block h1{font-size:20px;font-weight:800;color:#111;letter-spacing:-.02em}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#1C3F2F;color:#fff}
thead th{padding:9px 10px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
tbody tr{border-bottom:1px solid #f0f0f0}
tbody tr:nth-child(even){background:#fafafa}
tbody td{padding:9px 10px;vertical-align:middle;color:#222;line-height:1.4}

td.num{font-size:10px;color:#bbb;font-weight:600;width:24px;text-align:center}
td.photo{width:72px;padding:6px 8px}
td.photo img{width:64px;height:48px;object-fit:cover;border-radius:4px;border:1px solid #eee;display:block}
td.photo .no-img{width:64px;height:48px;background:#f5f5f5;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#ccc;border:1px solid #eee}
td.type{font-weight:700;font-size:12px;color:#111}
td.location{color:#666;font-size:11px;max-width:120px}
td.area{font-size:11px;color:#444;white-space:nowrap;text-align:right}
td.price{font-weight:800;color:#1C3F2F;white-space:nowrap;font-size:13px;text-align:right}
td.details{font-size:10px;color:#666;max-width:180px;line-height:1.5}

.deal-pill{
  display:inline-block;font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:1px 6px;border-radius:100px;margin-top:2px;
}
.pill-sale{background:#f0f7f3;color:#1C3F2F;border:1px solid #c6e2d4}
.pill-rent{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}

/* ── FOOTER ── */
.doc-footer{
  margin-top:20px;padding-top:16px;border-top:1px solid #eee;
  display:flex;align-items:center;justify-content:space-between;
}
.footer-note{font-size:10px;color:#bbb;line-height:1.7}
.footer-contact{text-align:right;font-size:10px;color:#bbb;line-height:1.7}
.footer-contact strong{color:#1C3F2F;font-weight:700}

/* ── LOADING ── */
#loading{text-align:center;padding:48px;color:#aaa;font-size:13px}

/* ── PRINT ── */
@media print{
  body{padding:16px 20px}
  tbody tr:hover{background:inherit}
  .no-print{display:none}
}

/* ── PRINT BUTTON ── */
.print-btn{
  position:fixed;bottom:24px;right:24px;
  background:#1C3F2F;color:#fff;border:none;border-radius:100px;
  padding:10px 20px;font-size:12px;font-weight:700;font-family:inherit;
  cursor:pointer;display:flex;align-items:center;gap:7px;
  box-shadow:0 4px 16px rgba(28,63,47,.25);transition:background .15s;
}
.print-btn:hover{background:#2D6A4F}
.print-btn svg{width:14px;height:14px}
@media print{.print-btn{display:none}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="doc-header">
  <div class="brand">
    <img src="/image/mfrg-img.png" alt="Broker France">
    <div>
      <div class="brand-name">Broker France</div>
      <div class="brand-sub">francebrokerage.com</div>
    </div>
  </div>
  <div class="doc-meta">
    <div class="label">Prepared for</div>
    <div class="value">Arvie</div>
    <div class="date" id="today-date"></div>
  </div>
</div>

<!-- TITLE -->
<div class="title-block">
  <span class="client-tag">Tripping Summary</span>
  <h1>La Residencia</h1>
</div>

<!-- TABLE -->
<div id="loading">Loading listings…</div>
<table id="table" style="display:none">
  <thead>
    <tr>
      <th>#</th>
      <th>Photo</th>
      <th>Type</th>
      <th>Location</th>
      <th>Lot Area</th>
      <th>Floor Area</th>
      <th>Price</th>
      <th>Key Details</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<!-- FOOTER -->
<div class="doc-footer">
  <div class="footer-note">
    All prices are subject to change without prior notice.
  </div>
  <div class="footer-contact">
    <strong>Broker France</strong> · info@francebrokerage.com · francebrokerage.com
  </div>
</div>

<!-- PRINT BUTTON -->
<button class="print-btn no-print" onclick="window.print()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
  Print / Save PDF
</button>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycby9HtdFVdICJeCucUosYs0cPt_Ah5eRENB3Sp7aDDB1-u2273D5lAB_pzUW0H_irlmaVw/exec';

document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

function fmt(n){
  const num=parseFloat(String(n).replace(/[^0-9.]/g,''));
  if(isNaN(num))return n||'—';
  if(num>=1_000_000)return '₱'+(num/1_000_000).toFixed(2).replace(/\.?0+$/,'')+'M';
  if(num>=1_000)return '₱'+(num/1_000).toFixed(0)+'K';
  return '₱'+num.toLocaleString();
}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

function driveThumb(url){
  if(!url) return '';
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m) return 'https://drive.google.com/uc?export=view&id='+m[1];
  const m2=url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m2) return 'https://drive.google.com/uc?export=view&id='+m2[1];
  return url;
}

function pick(r,...keys){
  for(const k of keys){
    if(r[k]!==undefined && r[k]!=='') return r[k];
    const found=Object.keys(r).find(rk=>rk.toLowerCase().includes(k.toLowerCase()));
    if(found && r[found]!=='') return r[found];
  }
  return '';
}

async function load(){
  try{
    const res=await fetch(API_URL,{redirect:'follow'});
    const data=await res.json();
    const listings=data.filter(r=>(pick(r,'location')||'').toLowerCase().includes('residencia'));
    render(listings);
  }catch(e){
    document.getElementById('loading').textContent='Could not load listings. Please refresh.';
  }
}

function render(listings){
  document.getElementById('loading').style.display='none';
  if(!listings.length){
    document.getElementById('loading').style.display='block';
    document.getElementById('loading').textContent='No listings found for La Residencia.';
    return;
  }
  const isRent=d=>(d||'').toLowerCase().includes('rent');
  document.getElementById('tbody').innerHTML=listings.map((r,i)=>{
    const deal=pick(r,'deal','sale_lease');
    const type=pick(r,'type','property_type');
    const location=pick(r,'location');
    const lotArea=pick(r,'lot_area','lot');
    const floorArea=pick(r,'floor_area','floor');
    const price=pick(r,'price','amount','selling_price');
    const keyDetails=pick(r,'key_details','details','key');
    const photo=driveThumb(pick(r,'thumbnail','photos','photo'));
    return `
    <tr>
      <td class="num">${i+1}</td>
      <td class="photo">${photo?`<img src="${esc(photo)}" alt="" onerror="this.parentElement.innerHTML='<div class=no-img>No photo</div>'">`:'<div class="no-img">No photo</div>'}</td>
      <td class="type">
        ${esc(type||'Property')}
        <div><span class="deal-pill ${isRent(deal)?'pill-rent':'pill-sale'}">${esc(deal||'For Sale')}</span></div>
      </td>
      <td class="location">${esc(location||'—')}</td>
      <td class="area">${lotArea?esc(lotArea)+' sqm':'—'}</td>
      <td class="area">${floorArea?esc(floorArea)+' sqm':'—'}</td>
      <td class="price">${price?fmt(price):'—'}${isRent(deal)?'<div style="font-size:9px;font-weight:500;color:#888">/month</div>':''}</td>
      <td class="details">${esc(keyDetails||'—')}</td>
    </tr>`;
  }).join('');
  document.getElementById('table').style.display='table';
}

load();
</script>
</body>
</html>
